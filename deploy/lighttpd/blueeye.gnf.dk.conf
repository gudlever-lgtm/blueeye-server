# blueeye.gnf.dk — lighttpd TLS terminator + reverse proxy for blueeye-server.
#
# lighttpd listens on :443 (HTTPS) and forwards to the blueeye-server app on
# 127.0.0.1:3000. The app speaks plain HTTP — lighttpd does the TLS. The agent
# and dashboard WebSocket channels (/ws/agent, /ws/dashboard) ride through via
# the HTTP Upgrade pass-through: the `proxy.header ("upgrade" => "enable")` line
# is what carries them. Leave it out and every agent + the live dashboard fail
# to connect (plain API calls would still work, masking the problem).
#
# Requires lighttpd >= 1.4.46 (WebSocket proxying); the separate `ssl.privkey`
# below needs >= 1.4.53. Check with: lighttpd -version
#
# Install (Debian/Ubuntu layout):
#   sudo cp deploy/lighttpd/blueeye.gnf.dk.conf /etc/lighttpd/conf-available/10-blueeye.conf
#   sudo lighttpd-enable-mod blueeye      # or: ln -s into conf-enabled/
#   sudo lighttpd -t -f /etc/lighttpd/lighttpd.conf   # validate
#   sudo systemctl reload lighttpd
#
# If the base lighttpd.conf already loads any of the modules below, drop them
# from this list (a duplicate load is harmless but noisy).

server.modules += ( "mod_openssl", "mod_proxy", "mod_setenv", "mod_redirect" )

# --- Plain HTTP (:80) -> HTTPS redirect ------------------------------------
# If you obtain certs with certbot's http-01 challenge, serve
# /.well-known/acme-challenge/ from a webroot BEFORE this redirect (or use the
# DNS-01 / standalone method and drop this block).
$SERVER["socket"] == ":80" {
  $HTTP["host"] == "blueeye.gnf.dk" {
    url.redirect = ( "^/(.*)" => "https://blueeye.gnf.dk/$1" )
    url.redirect-code = 308
  }
}

# --- HTTPS (:443) terminator + reverse proxy -------------------------------
$SERVER["socket"] == ":443" {
  ssl.engine  = "enable"

  # Full chain (leaf + intermediates) and the private key. Let's Encrypt paths:
  ssl.pemfile = "/etc/letsencrypt/live/blueeye.gnf.dk/fullchain.pem"
  ssl.privkey = "/etc/letsencrypt/live/blueeye.gnf.dk/privkey.pem"
  # NOTE: on lighttpd < 1.4.53 there is no `ssl.privkey` — instead concatenate
  # the private key and fullchain into one file and point ssl.pemfile at it.

  # Modern TLS only (TLS 1.2+).
  ssl.openssl.ssl-conf-cmd = ( "MinProtocol" => "TLSv1.2" )

  # Scope this vhost to the canonical hostname.
  $HTTP["host"] == "blueeye.gnf.dk" {

    # The app is on plain HTTP behind us; tell it the original scheme was https
    # so it builds https:// enrollment URLs. Express `trust proxy` is already
    # enabled in the app and reads X-Forwarded-Proto.
    setenv.add-request-header = ( "X-Forwarded-Proto" => "https" )

    # Forward everything to the app. "upgrade" => "enable" carries the WebSocket
    # Upgrade for /ws/agent (agents) and /ws/dashboard (live UI).
    proxy.server    = ( "" => ( ( "host" => "127.0.0.1", "port" => 3000 ) ) )
    proxy.header    = ( "upgrade" => "enable" )

    # Pass the real client IP + host downstream as an RFC 7239 Forwarded header.
    proxy.forwarded = ( "for" => 1, "proto" => 1, "host" => 1, "remote_addr" => 1 )
  }
}
