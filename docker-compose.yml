# BlueEye stack. Run from this directory with the repos cloned as siblings.
#
#   node scripts/dev-bootstrap.js                  # once: generates .env (keys + demo defaults)
#
# Customer stack (server + agent + db; the license server is NOT run here):
#   docker compose up --build
#   -> set LICENSE_SERVER_URL in .env to the vendor's hosted licens.
#
# Full / vendor stack (also runs the license server):
#   COMPOSE_PROFILES=licens docker compose up --build   # or: docker compose --profile licens up --build
#
# blueeye-licens sits behind the "licens" profile so it only runs for the vendor;
# customers validate against LICENSE_SERVER_URL. scripts/deploy.sh deploys the
# customer stack; scripts/deploy-licens.sh deploys the licens service.
# Ports: server :3000, licens :4000 (vendor only), MySQL :3306.
name: blueeye

services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env (run scripts/dev-bootstrap.js)}
      MYSQL_USER: ${DB_USER:-blueeye}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env (run scripts/dev-bootstrap.js)}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Host 3306 is often taken by a system MySQL — default to 3307 on the host.
      # Bound to loopback so the database is never published to the LAN; override
      # DB_HOST_PORT only if you understand the exposure.
      - "127.0.0.1:${DB_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 5s
      timeout: 5s
      retries: 30

  licens:
    # Vendor-only: the central license server. Customers do NOT run this — their
    # blueeye-server validates against the vendor's hosted licens via
    # LICENSE_SERVER_URL. Started only with the "licens" profile (deploy-licens.sh);
    # a plain `docker compose up` (deploy.sh) skips it.
    profiles: ["licens"]
    build: ../blueeye-licens
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: db
      DB_USER: ${DB_USER:-blueeye}
      DB_PASSWORD: ${DB_PASSWORD:-blueeye-pw}
      DB_NAME: blueeye_licens
      JWT_SECRET: ${LICENS_JWT_SECRET:?set LICENS_JWT_SECRET in .env (run scripts/dev-bootstrap.js)}
      SEED_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@blueeye.local}
      # Empty by default → migrate.js generates a random admin password and prints
      # it once. Set ADMIN_PASSWORD only to choose your own.
      SEED_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      LICENSE_SIGNING_KEY: ${LICENSE_SIGNING_KEY}
      SEED_DEMO: ${SEED_DEMO:-0}
      SEED_DEMO_LICENSE_KEY: ${SEED_DEMO_LICENSE_KEY:-DEMO-DEMO-DEMO-DEMO-DEMO}
      SEED_DEMO_MAX_AGENTS: ${SEED_DEMO_MAX_AGENTS:-100}
    command: sh -c "node src/migrate.js && node scripts/seed-demo.js && node src/server.js"
    ports:
      - "${LICENS_HOST_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  server:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_USER: ${DB_USER:-blueeye}
      DB_PASSWORD: ${DB_PASSWORD:-blueeye-pw}
      DB_NAME: blueeye
      JWT_SECRET: ${SERVER_JWT_SECRET:?set SERVER_JWT_SECRET in .env (run scripts/dev-bootstrap.js)}
      SEED_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@blueeye.local}
      # Empty by default → migrate.js generates a random admin password and prints
      # it once. Set ADMIN_PASSWORD only to choose your own.
      SEED_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      LICENSE_KEY: ${LICENSE_KEY:-DEMO-DEMO-DEMO-DEMO-DEMO}
      # Left blank for real customers: the server then derives a stable serverId
      # from the host (see src/license/serverIdentity.js) and licens binds the
      # licence to it on first validation, so only LICENSE_KEY need be set. The
      # demo .env (scripts/dev-bootstrap.js) sets gnf-server-1 explicitly to match
      # its seeded demo licence.
      LICENSE_SERVER_ID: ${LICENSE_SERVER_ID:-}
      # Where this server validates its license. Customers set this to the vendor's
      # hosted licens URL. Default keeps the vendor's on-host licens (run with the
      # "licens" profile). The server tolerates outages up to LICENSE_GRACE_DAYS.
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-http://licens:4000}
      # Empty default so removing it from .env doesn't emit a Compose "variable is
      # not set" warning — a real production install leaves this unset and relies
      # on the key embedded in src/license/publicKey.js.
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY:-}
      # Only needed to make LICENSE_PUBLIC_KEY above take effect (NODE_ENV is
      # production in this stack). scripts/dev-bootstrap.js sets this for the
      # disposable local demo key pair. A real production install should embed
      # the vendor's public key in src/license/publicKey.js instead and leave
      # this unset — see docs/licensing.md.
      TRUST_ANCHOR_OVERRIDE_ACK: ${TRUST_ANCHOR_OVERRIDE_ACK:-}
      LICENSE_CACHE_PATH: /data/license-cache.json
      # Demo enrollment seeding is OFF by default; scripts/dev-bootstrap.js sets
      # SEED_DEMO=1 in .env for the turnkey demo. Never enable in production.
      SEED_DEMO: ${SEED_DEMO:-0}
      SEED_DEMO_ENROLLMENT_CODE: ${SEED_DEMO_ENROLLMENT_CODE:-DEMO-ENROLL-CODE}
      # Where the agent source bundle is packaged from (see the bind mount below).
      AGENT_SOURCE_DIR: /agent-src
    command: sh -c "node src/migrate.js && node scripts/seed-demo.js && node src/server.js"
    volumes:
      - server-data:/data
      # Host machine-id (read-only) so the derived LICENSE_SERVER_ID stays stable
      # across container recreation when LICENSE_SERVER_ID is unset. Without it the
      # server falls back to hostname/MAC, which change on recreate — see
      # src/license/serverIdentity.js and docs/licensing.md.
      - /etc/machine-id:/etc/machine-id:ro
      # The agent source tree (the sibling checkout), packaged + served at
      # /enroll/agent-source.tgz so the one-line installer can build + run it
      # (Docker/Node) with NO published binaries. Read-only — the server only
      # reads it. Matches AGENT_SOURCE_DIR below.
      - ../blueeye-agent:/agent-src:ro
    ports:
      - "${SERVER_HOST_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  agent:
    build: ../blueeye-agent
    environment:
      BLUEEYE_SERVER_URL: http://server:3000
      BLUEEYE_ENROLLMENT_CODE: ${AGENT_ENROLLMENT_CODE:-DEMO-ENROLL-CODE}
      BLUEEYE_TOKEN_PATH: /data/agent-token
      BLUEEYE_AGENT_CONFIG: /data/agent-config.json
      BLUEEYE_LOG_LEVEL: info
    volumes:
      - agent-data:/data
    depends_on:
      server:
        condition: service_healthy
    restart: on-failure

volumes:
  db-data:
  server-data:
  agent-data:
