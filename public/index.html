<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" sizes="32x32 16x16" />
    <title>BlueEye — Server</title>
    <!-- Leaflet (open source, BSD) for the locations map. Loaded from the
         official CDN; if it is unavailable (offline/CSP) the map view falls
         back to a location list. Point these at a self-hosted copy for a fully
         on-prem deployment. -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Optional marker clustering (degrades gracefully if unavailable). -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script defer src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Login -->
    <main id="login" class="login hidden">
      <form id="login-form" class="card">
        <h1>BlueEye <span class="muted">server</span></h1>
        <label>Email <input type="email" id="email" value="admin@blueeye.local" required /></label>
        <label>Password <input type="password" id="password" required /></label>
        <button type="submit">Log in</button>
        <p id="login-error" class="error"></p>
        <!-- Federated sign-in (OIDC/SAML). Populated by app.js from GET /auth/sso
             only when a method is licensed + configured; hidden otherwise. -->
        <div id="sso-options" class="sso-options hidden"></div>
      </form>
    </main>

    <!-- App: fixed sidebar (brand + nav) + content column (topbar + view) -->
    <div id="app" class="hidden">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">◉</span>
          <span class="brand-name">BlueEye <span class="muted">server</span></span>
        </div>
        <!-- Navigation is grouped into categories and each item declares the
             minimum role that may use it (data-min-role, default viewer). app.js
             hides items above the user's role and collapses any empty category.
             Each category label is a button that folds/unfolds its group; the
             collapsed state is remembered per browser (see setupNavGroups). Groups
             start collapsed here to match the default; setupNavGroups then applies
             the per-browser remembered state. -->
        <nav class="tabs">
          <div class="nav-group collapsed" data-category="Monitoring">
            <button type="button" class="nav-group-label" aria-expanded="false">Monitoring</button>
            <button data-view="fleet" class="active">Overview</button>
            <button data-view="overview">Traffic</button>
            <button data-view="map">Sites</button>
            <button data-view="geo" data-feature="geo">Destinations</button>
          </div>
          <div class="nav-group collapsed" data-category="Fleet">
            <button type="button" class="nav-group-label" aria-expanded="false">Fleet</button>
            <button data-view="agents">Agents</button>
            <button data-view="interfaces">Interfaces</button>
            <button data-view="nics">NICs</button>
          </div>
          <div class="nav-group collapsed" data-category="Diagnostics">
            <button type="button" class="nav-group-label" aria-expanded="false">Diagnostics</button>
            <button data-view="probes">Probes &amp; Tests</button>
            <button data-view="transactions">Transaktionstests</button>
            <button data-view="flows">Flows</button>
            <button data-view="topology">Topology</button>
            <button data-view="investigation" data-min-role="operator">Troubleshooting</button>
            <button data-view="docs">Documentation</button>
          </div>
          <div class="nav-group collapsed" data-category="Insights">
            <button type="button" class="nav-group-label" aria-expanded="false">Insights</button>
            <button data-view="findings" data-feature="analysis">Analysis</button>
            <button data-view="incidents" data-feature="analysis">Incidents</button>
            <button data-view="reporting">Reporting</button>
          </div>
          <div class="nav-group collapsed" data-category="Administration">
            <button type="button" class="nav-group-label" aria-expanded="false">Administration</button>
            <button data-view="locations">Locations</button>
            <button data-view="enrollment" data-min-role="operator">Enrollment</button>
            <button data-view="logs" data-min-role="admin">Logs</button>
            <button data-view="settings">Settings</button>
          </div>
        </nav>
        <div class="sidebar-foot" id="sidebar-foot">BlueEye server</div>
      </aside>
      <div class="shell">
        <header class="topbar">
          <button id="nav-toggle" class="ghost nav-toggle" title="Toggle navigation" aria-label="Toggle navigation">☰</button>
          <span class="spacer"></span>
          <input id="search-q" class="topbar-search" type="search" placeholder="Search agent / IP / port…" autocomplete="off" />
          <label class="autorefresh muted" title="Auto-refresh every 5 seconds">
            <input type="checkbox" id="autorefresh" /> Auto
          </label>
          <span id="whoami" class="muted"></span>
          <button id="theme" class="ghost" title="Toggle light/dark theme">🌙</button>
          <button id="refresh" class="ghost" title="Refresh">⟳</button>
          <button id="logout" class="ghost">Log out</button>
        </header>
        <main id="view" tabindex="-1"></main>
      </div>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite" aria-atomic="true"></div>
    <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Dialog"><div class="modal-card" id="modal-card" tabindex="-1"></div></div>

    <script src="/app.js"></script>
  </body>
</html>
