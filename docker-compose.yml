# BlueEye stack. Run from this directory with the repos cloned as siblings.
#
#   node scripts/dev-bootstrap.js                  # once: generates .env (keys + demo defaults)
#
# Customer stack (server + agent + db; the license server is NOT run here):
#   docker compose up --build
#   -> set LICENSE_SERVER_URL in .env to the vendor's hosted licens.
#
# Full / vendor stack (also runs the license server):
#   COMPOSE_PROFILES=licens docker compose up --build   # or: docker compose --profile licens up --build
#
# blueeye-licens sits behind the "licens" profile so it only runs for the vendor;
# customers validate against LICENSE_SERVER_URL. scripts/deploy.sh deploys the
# customer stack; scripts/deploy-licens.sh deploys the licens service.
# Ports: server :3000, licens :4000 (vendor only), MySQL :3306.
name: blueeye

services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_USER: ${DB_USER:-blueeye}
      MYSQL_PASSWORD: ${DB_PASSWORD:-blueeye-pw}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Host 3306 is often taken by a system MySQL — default to 3307 on the host.
      - "${DB_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 5s
      timeout: 5s
      retries: 30

  licens:
    # Vendor-only: the central license server. Customers do NOT run this — their
    # blueeye-server validates against the vendor's hosted licens via
    # LICENSE_SERVER_URL. Started only with the "licens" profile (deploy-licens.sh);
    # a plain `docker compose up` (deploy.sh) skips it.
    profiles: ["licens"]
    build: ../blueeye-licens
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: db
      DB_USER: ${DB_USER:-blueeye}
      DB_PASSWORD: ${DB_PASSWORD:-blueeye-pw}
      DB_NAME: blueeye_licens
      JWT_SECRET: ${LICENS_JWT_SECRET:-change-me-licens}
      SEED_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@blueeye.local}
      SEED_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin-pw}
      LICENSE_SIGNING_KEY: ${LICENSE_SIGNING_KEY}
      SEED_DEMO: ${SEED_DEMO:-1}
      SEED_DEMO_LICENSE_KEY: ${SEED_DEMO_LICENSE_KEY:-DEMO-DEMO-DEMO-DEMO-DEMO}
      SEED_DEMO_MAX_AGENTS: ${SEED_DEMO_MAX_AGENTS:-100}
    command: sh -c "node src/migrate.js && node scripts/seed-demo.js && node src/server.js"
    ports:
      - "${LICENS_HOST_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  server:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_USER: ${DB_USER:-blueeye}
      DB_PASSWORD: ${DB_PASSWORD:-blueeye-pw}
      DB_NAME: blueeye
      JWT_SECRET: ${SERVER_JWT_SECRET:-change-me-server}
      SEED_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@blueeye.local}
      SEED_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin-pw}
      LICENSE_KEY: ${LICENSE_KEY:-DEMO-DEMO-DEMO-DEMO-DEMO}
      LICENSE_SERVER_ID: ${LICENSE_SERVER_ID:-gnf-server-1}
      # Where this server validates its license. Customers set this to the vendor's
      # hosted licens URL. Default keeps the vendor's on-host licens (run with the
      # "licens" profile). The server tolerates outages up to LICENSE_GRACE_DAYS.
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-http://licens:4000}
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY}
      LICENSE_CACHE_PATH: /data/license-cache.json
      SEED_DEMO: ${SEED_DEMO:-1}
      SEED_DEMO_ENROLLMENT_CODE: ${SEED_DEMO_ENROLLMENT_CODE:-DEMO-ENROLL-CODE}
      # Where the agent source bundle is packaged from (see the bind mount below).
      AGENT_SOURCE_DIR: /agent-src
    command: sh -c "node src/migrate.js && node scripts/seed-demo.js && node src/server.js"
    volumes:
      - server-data:/data
      # The agent source tree (the sibling checkout), packaged + served at
      # /enroll/agent-source.tgz so the one-line installer can build + run it
      # (Docker/Node) with NO published binaries. Read-only — the server only
      # reads it. Matches AGENT_SOURCE_DIR below.
      - ../blueeye-agent:/agent-src:ro
    ports:
      - "${SERVER_HOST_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  agent:
    build: ../blueeye-agent
    environment:
      BLUEEYE_SERVER_URL: http://server:3000
      BLUEEYE_ENROLLMENT_CODE: ${AGENT_ENROLLMENT_CODE:-DEMO-ENROLL-CODE}
      BLUEEYE_TOKEN_PATH: /data/agent-token
      BLUEEYE_AGENT_CONFIG: /data/agent-config.json
      BLUEEYE_LOG_LEVEL: info
    volumes:
      - agent-data:/data
    depends_on:
      server:
        condition: service_healthy
    restart: on-failure

volumes:
  db-data:
  server-data:
  agent-data:
